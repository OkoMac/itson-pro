version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: itson-pro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: itson_pro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itson-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itson-pro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itson-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: itson-pro-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres123@postgres:5432/itson_pro?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "dev-jwt-secret-change-in-production"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-in-production"
      NODE_ENV: "development"
      CORS_ORIGIN: "http://localhost:8080"
      PORT: "3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - itson-network
    command: npm run dev

  # Frontend (PWA)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: itson-pro-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      VITE_API_URL: "http://localhost:3001/api"
      VITE_WS_URL: "ws://localhost:3001"
    depends_on:
      - backend
    networks:
      - itson-network

  # Adminer (Database GUI - optional)
  adminer:
    image: adminer
    container_name: itson-pro-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - itson-network

  # Redis Commander (Redis GUI - optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: itson-pro-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      - redis
    networks:
      - itson-network

volumes:
  postgres_data:
  redis_data:

networks:
  itson-network:
    driver: bridge
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build & push Docker images ───────────────────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "value=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Docker meta (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (stub — wire up your hosting provider here) ──────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy notification
        run: |
          echo "Deploying version ${{ needs.build-and-push.outputs.version }}"
          echo "Frontend image: ${{ needs.build-and-push.outputs.frontend_tag }}"
          echo "Backend image:  ${{ needs.build-and-push.outputs.backend_tag }}"
          # ── Add your deployment steps below ────────────────────────────────
          # Examples:
          #   SSH: ssh user@host 'docker compose pull && docker compose up -d'
          #   Railway: railway up
          #   Render: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          #   Coolify: curl -X POST ${{ secrets.COOLIFY_WEBHOOK_URL }}
          echo "Wire up your deploy target in this step."
